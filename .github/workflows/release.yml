name: Release

# Sürüm etiketi push edildiğinde (örn. v0.1.0) her platformda installer + imzalı
# updater artefaktları üretir ve bir GitHub Release'e (latest.json ile) yükler.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS (Apple Silicon) — native arm64. Java 8 için Adoptium aarch64
          # bulunmadığından native arm64 Azul Zulu JRE 8 gömülür (Rosetta yok);
          # Java 21 için Adoptium aarch64 kullanılır.
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          # NOT: macOS Intel (macos-13) bilinçli olarak kaldırıldı. GitHub'ın
          # Intel macOS runner'ları kıt/emekliye ayrılıyor; job saatlerce boş
          # runner bekleyip release'i bloke ediyordu. Yalnızca Apple Silicon
          # (arm64) macOS üretilir.
          # Linux (Ubuntu) — .deb
          - platform: ubuntu-22.04
            args: ""
          # Windows — NSIS
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Linux bağımlılıkları (webkit2gtk vb.)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Bağımlılıkları kur
        run: pnpm install --frozen-lockfile

      - name: Platforma özel JRE'leri göm (Java 8 + Java 21)
        run: pnpm fetch-jre

      # Java servislerinin (agent/verifier/xslt) EN GÜNCEL jar'larını installer'a
      # göm. Sürüm bu build anına KİLİTLENİR (services.lock.json); çalışma anında
      # GitHub'dan indirme gerekmez (kurumsal proxy/çevrimdışı ortamda da çalışır).
      # Token rate-limit'i aşmak için. `.NET html-to-pdf` bilinçli olarak gömülmez.
      - name: Java servislerini göm (agent + verifier + xslt)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm fetch-services

      - name: Build + imzalı updater artefaktları + Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri updater imzası (ZORUNLU — createUpdaterArtifacts: true).
          # Bu iki secret tanımlı değilse build BAŞARISIZ olur.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS kod imzalama + notarization (OPSİYONEL).
          # Yalnızca macOS runner'larında ve ilgili secret'lar tanımlıysa devreye
          # girer; tanımlı değilken tauri-action bu adımları sessizce atlar
          # (uygulama ad-hoc/imzasız üretilir). Notarization için APPLE_ID +
          # APPLE_PASSWORD + APPLE_TEAM_ID üçü birden gereklidir.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "İmzamatik ${{ github.ref_name }}"
          # Taslak DEĞİL: release otomatik yayınlansın. Updater ucu
          # (releases/latest/download/latest.json) yalnız YAYINLANMIŞ,
          # prerelease olmayan release'i gördüğünden bu zorunlu.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
