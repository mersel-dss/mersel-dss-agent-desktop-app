name: Release

# Sürüm etiketi push edildiğinde (örn. v0.1.0) her platformda installer + imzalı
# updater artefaktları üretir ve bir GitHub Release'e (latest.json ile) yükler.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS (Apple Silicon) — native arm64. Tüm servisler için tek JRE
          # gömülür: Adoptium Temurin JRE 21 (native aarch64).
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          # NOT: macOS Intel (macos-13) bilinçli olarak kaldırıldı. GitHub'ın
          # Intel macOS runner'ları kıt/emekliye ayrılıyor; job saatlerce boş
          # runner bekleyip release'i bloke ediyordu. Yalnızca Apple Silicon
          # (arm64) macOS üretilir.
          # Linux (Ubuntu) — .deb
          - platform: ubuntu-22.04
            args: ""
          # Windows — NSIS
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Linux bağımlılıkları (webkit2gtk vb.)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Bağımlılıkları kur
        run: pnpm install --frozen-lockfile

      - name: Platforma özel JRE'yi göm (yalnız Java 21 — tüm servisler)
        run: pnpm fetch-jre

      # Java servislerinin (agent/verifier/xslt) EN GÜNCEL jar'larını installer'a
      # göm. Sürüm bu build anına KİLİTLENİR (services.lock.json); çalışma anında
      # GitHub'dan indirme gerekmez (kurumsal proxy/çevrimdışı ortamda da çalışır).
      # Token rate-limit'i aşmak için. `.NET html-to-pdf` bilinçli olarak gömülmez.
      - name: Java servislerini göm (agent + verifier + xslt)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm fetch-services

      # WinSW (Windows Service Wrapper) ikilisini göm. Yalnız Windows'ta gerekir:
      # NSIS installer, gömülü JRE + jar'ı WinSW ile gerçek Windows Service'lerine
      # sarmalar (services.msc'de görünür, Session 0'da gizli, otomatik başlar).
      - name: WinSW ikilisini göm (Windows Service sarmalayıcı)
        if: runner.os == 'Windows'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm fetch-winsw

      # .NET html-to-pdf servisini de Windows installer'a göm (Web.exe + Playwright
      # JS sürücüsü). Yalnız Windows'ta: installer bunu da WinSW ile gerçek Windows
      # Service'i yapar. ~80MB sıkıştırılmış; Chromium ikilisi pakette YOK, servis
      # ilk PDF'te Playwright ile indirir (yazılabilir ProgramData yoluna).
      - name: html-to-pdf'i göm (Windows Service için)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = 'Stop'
          $dest = "src-tauri/resources/services/html-to-pdf"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          $tmp = Join-Path $env:RUNNER_TEMP 'h2p'
          gh release download --repo mersel-os/html-to-pdf --pattern "*-win-x64.zip" --dir $tmp --clobber
          $zip = Get-ChildItem "$tmp/*-win-x64.zip" | Select-Object -First 1
          if (-not $zip) { throw "html-to-pdf win-x64.zip indirilemedi" }
          Expand-Archive -Path $zip.FullName -DestinationPath $dest -Force
          if (-not (Get-ChildItem -Path $dest -Filter 'Web.exe' -Recurse)) {
            throw "html-to-pdf paketinde Web.exe bulunamadı"
          }
          Write-Host "html-to-pdf gömüldü → $dest"

      # macOS notarization, .app içindeki jar'ların İÇİNDEKİ Mach-O native'leri de
      # tarar. `agent` jar'ı ad-hoc imzalı bir libpkcs11wrapper.jnilib taşır;
      # imzalanmazsa notarization patlar (v0.1.11 mac build'i bu yüzden çöktü).
      # Bu adım gömülü jar'ların içindeki native'leri Developer ID + timestamp ile
      # YENİDEN imzalar ve nested jar'ları Spring Boot'un beklediği STORED biçimde
      # geri gömer. Yalnız macOS'ta ve imza secret'ı tanımlıysa iş yapar.
      - name: Gömülü jar içi native'leri imzala (macOS notarization)
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: bash scripts/sign-bundled-natives.sh

      - name: Build + imzalı updater artefaktları + Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri updater imzası (ZORUNLU — createUpdaterArtifacts: true).
          # Bu iki secret tanımlı değilse build BAŞARISIZ olur.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS kod imzalama + notarization (OPSİYONEL).
          # Yalnızca macOS runner'larında ve ilgili secret'lar tanımlıysa devreye
          # girer; tanımlı değilken tauri-action bu adımları sessizce atlar
          # (uygulama ad-hoc/imzasız üretilir). Notarization için APPLE_ID +
          # APPLE_PASSWORD + APPLE_TEAM_ID üçü birden gereklidir.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "İmzamatik ${{ github.ref_name }}"
          # Taslak DEĞİL: release otomatik yayınlansın. Updater ucu
          # (releases/latest/download/latest.json) yalnız YAYINLANMIŞ,
          # prerelease olmayan release'i gördüğünden bu zorunlu.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
