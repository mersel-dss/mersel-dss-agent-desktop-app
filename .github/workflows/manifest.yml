name: Servis Manifesti

# NEDEN: İstemcinin kimliksiz api.github.com'a gitmesi kurumsal NAT'ta (tek IP
# arkasında onlarca kişi) saatlik 60 istek limitini patlatıp 403 veriyordu.
# Bu workflow servis sürümlerini SUNUCUDA token'la (5000/saat) çözer ve
# istemcinin tek bir CDN URL'sinden okuyacağı statik manifest.json'ı
# GitHub Pages'e yayınlar. Böylece istemci api.github.com'a hiç dokunmaz.
#
# TEK SEFERLİK KURULUM: Repo Settings → Pages → Source = "GitHub Actions".

on:
  schedule:
    # Saatte bir (:17 — tam saat yoğunluğundan kaçınmak için). Yeni servis
    # sürümleri en geç ~1 saat içinde manifeste yansır.
    - cron: "17 * * * *"
  workflow_dispatch: # elle anında tazeleme
  push:
    branches: [main, master]
    paths:
      - "scripts/build-manifest.mjs"
      - ".github/workflows/manifest.yml"

# Pages deploy için gerekli izinler.
permissions:
  contents: read
  pages: write
  id-token: write

# Aynı anda tek deploy; sıradaki tetikler beklesin (eskiyi iptal etme).
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Manifesti üret (+ servis asset'lerini R2'ye ayna)
        run: node scripts/build-manifest.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # R2 aynası (opsiyonel). Secret'lar yoksa script no-op'tur; URL'ler GitHub'da kalır.
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
          AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE: ${{ secrets.R2_PUBLIC_BASE }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
